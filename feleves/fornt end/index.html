<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telek Terület</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Telek Terület Meghatározása</h1>

        <label for="sizeInput" class="form-label">Mátrix mérete (n x n):</label>
        <form id="matrixForm">
            <input type="number" id="sizeInput" class="form-control" placeholder="Pl.: 4" min="2" max="9" required>
            <button type="submit" id="generateMatrix" class="btn btn-primary mt-3">Mátrix létrehozása</button>
        </form>
        <button id="fillRandomButton" class="btn btn-secondary mt-2" disabled="">Véletlenszerű feltöltés</button>
        <div id="matrixContainer" class="mt-4"></div>

        <label for="epsilonInput" class="form-label mt-3">Epszilon érték:</label>
        <input type="number" id="epsilonInput" class="form-control" placeholder="Pl.: 2" min="0" required>
        
        <button id="sendButton" class="btn btn-primary mt-3">Számítás indítása</button>

        <div id="resultContainer" class="mt-5"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
